<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat Room</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SockJS and Stomp.js Client Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=150" alt="My Profile" class="avatar">
                    <div class="user-info">
                        <span class="user-name">Adil G.</span>
                        <span class="user-status"><span class="status-dot online"></span>Online</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" title="New Group"><i class="fa-solid fa-users"></i></button>
                    <button class="icon-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
                </div>
            </header>
            
            <div class="search-bar-container">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" placeholder="Search conversations..." class="search-input">
                </div>
            </div>
            
            <div class="conversations-list" id="conversationsList">
                <!-- Loaded dynamically from database -->
            </div>
        </aside>
        
        <!-- Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="active-contact-profile">
                    <div class="avatar-container">
                        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=150" alt="Alex Carter" class="avatar">
                        <span class="status-dot online"></span>
                    </div>
                    <div class="contact-meta">
                        <span class="contact-name">Alex Carter</span>
                        <span class="contact-status">Active Now</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" title="Voice Call"><i class="fa-solid fa-phone"></i></button>
                    <button class="icon-btn" title="Video Call"><i class="fa-solid fa-video"></i></button>
                    <button class="icon-btn" title="Contact Info"><i class="fa-solid fa-circle-info"></i></button>
                </div>
            </header>
            
            <!-- Message List -->
            <div class="messages-container" id="messagesContainer">
                <div class="date-divider">Today</div>
                
                <!-- Incoming -->
                <div class="message incoming">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=150" alt="Alex Carter" class="message-avatar">
                    <div class="message-bubble-wrapper">
                        <div class="message-bubble">
                            Hey there! Have you seen the mock design for the new chat interface?
                        </div>
                        <span class="message-meta">14:28</span>
                    </div>
                </div>
                
                <!-- Outgoing -->
                <div class="message outgoing">
                    <div class="message-bubble-wrapper">
                        <div class="message-bubble">
                            Hey Alex! Yes, I just generated the mock. I'm building it using glassmorphic UI cards and gradients.
                        </div>
                        <span class="message-meta">14:30 <i class="fa-solid fa-check-double read-receipt"></i></span>
                    </div>
                </div>
                
                <!-- Incoming -->
                <div class="message incoming">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=150" alt="Alex Carter" class="message-avatar">
                    <div class="message-bubble-wrapper">
                        <div class="message-bubble">
                            That design looks absolutely incredible! Let's implement it.
                        </div>
                        <span class="message-meta">14:32</span>
                    </div>
                </div>
            </div>
            
            <!-- Message Input Bar -->
            <footer class="chat-input-bar">
                <button class="icon-btn attach-btn" title="Attach file"><i class="fa-solid fa-plus"></i></button>
                <div class="input-wrapper">
                    <input type="text" placeholder="Type a message..." class="message-input" id="messageInput">
                    <button class="icon-btn emoji-btn" title="Add Emoji"><i class="fa-regular fa-face-smile"></i></button>
                </div>
                <button class="send-btn" id="sendBtn" title="Send Message">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </footer>
        </main>
    </div>
    
    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
